<!DOCTYPE html>
<head>
<meta charset="UTF-8">
<title>Për Tezen Luja - 8 Mars</title>

<style>

body{
margin:0;
font-family:Courier New;
text-align:center;
background:linear-gradient(135deg,#ffb6c1,#ffc0cb,#ffe4e1);
}

h1{
margin-top:40px;
font-size:50px;
color:#b30059;
}

p{
font-size:22px;
color:#800040;
}

.gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
padding:30px;
}

.gallery img{
width:250px;
height:250px;
object-fit:cover;
border-radius:20px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* Foto e madhe */

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

#lightbox img{
max-width:80%;
max-height:80%;
border-radius:15px;
}

.footer{
margin:40px;
font-size:20px;
color:#660033;
}

</style>
</head>

<body>

<h1>🌸 Gëzuar 8 Marsin 🌸</h1>
<p>Për tezen time të dashur Luja 💗</p>

<div class="gallery">

<img src="Pink and White Floral 8 March Instagram Post.png" onclick="openImg(this.src)">
<img src="Geen Floral Minimalist 8 March Happy Womens Day Instagram Post.png" onclick="openImg(this.src)">
<img src="Violet Natural 8 March Happy Women's Day Instagram Post (1).png" onclick="openImg(this.src)">
<img src="Beige Pastel Modern Happy International Women's Day Instagram Post.png" onclick="openImg(this.src)">

</div>

<div class="footer">
Të dua shumë Luja 💕
</div>

<div id="lightbox" onclick="closeImg()">
<img id="bigImg">
</div>

<script>

function openImg(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("bigImg").src=src;
}

function closeImg(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
